# Visualization defaults — see ARCHITECTURE.md §9

version: "1.0.0"

theme:
  name: dark
  background: "#0d1117"
  text: "#e6edf3"
  accent: "#f97316"

export:
  dpi: 300
  post_formats:
    - name: square
      width: 1080
      height: 1080
    - name: landscape
      width: 1200
      height: 675
  charts:
    rankings:
      width: 1600
      min_height: 1400
      height_per_player: 72
    pca:
      width: 1400
      height: 1200
    heatmap:
      width: 1500
      height: 1400

libraries:
  player_profiles: mplsoccer
  heatmaps: seaborn
  pca_static: matplotlib
  interactive_optional: plotly
  neighborhood_optional: umap-learn

pca:
  display_components: 2
  require_explained_variance_file: true
  scree_components: 10

optional:
  umap: false
  parallel_coordinates: false
  plotly_interactive: true

embed_3d:
  enabled: true
  # Default visible set comes from config/allowlist.yaml -> default_viz_players
  components: [PC1, PC2, PC3]
  marker_size_metric: impact_z
  show_origin_lines: true
  show_labels: false
  aspect_mode: cube
  orb_radius_min: 0.08
  orb_radius_max: 0.16

player_images:
  cache_dir: assets/players
  url_template: "https://www.basketball-reference.com/req/202106291/images/players/{player_id}.jpg"

skill_aspects:
  overall:
    label: Overall impact
    features: [bpm_z, vorp_z, per_z, ws_z]
  scoring:
    label: Scoring
    features: [ts_percent_z, usg_percent_z, x3p_ar_z]
  playmaking:
    label: Playmaking
    features: [ast_percent_z]
  defense:
    label: Defense
    features: [stl_percent_z, blk_percent_z]
  ball_security:
    label: Ball security
    features: [tov_percent_z]
  championship_legacy:
    label: Repeated titles
    source: rankings
    field: repeat_titles_score

profile_features:
  - bpm_z
  - vorp_z
  - per_z
  - ts_percent_z
  - usg_percent_z
  - ast_percent_z
  - stl_percent_z
  - blk_percent_z

captions:
  exploratory_disclaimer: "Exploratory layout only. Gold crown = #1 overall impact among currently visible players (mean BPM/VORP/PER/WS z). Bar chart uses score_goat_index (PCA + team-weighted titles + clutch/consensus adjustment)."
  era_adjustment: "Era-adjusted z-scores; full-league baselines by season and position."
