<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GOAT Stat-Space Explorer</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #site-app {
      display: grid; grid-template-rows: auto minmax(0, 1fr);
      width: 100%; height: 100%;
    }
    #site-nav {
      display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap; gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
      z-index: 10;
    }
    #site-brand {
      font-size: 0.9rem; font-weight: 600; margin-right: 12px;
      color: #e6edf3;
    }
    .site-nav-btn {
      padding: 7px 14px; border-radius: 999px;
      border: 1px solid #30363d; background: #161b22; color: #e6edf3;
      font-size: 0.82rem; cursor: pointer;
    }
    .site-nav-btn:hover { border-color: #f97316; }
    .site-nav-btn.active {
      background: #f97316; color: #0d1117; border-color: #f97316; font-weight: 600;
    }
    #site-frame {
      width: 100%; height: 100%; border: 0; display: block; background: #0d1117;
    }
  </style>
</head>
<body>
  <div id="site-app">
    <nav id="site-nav" aria-label="Main">
      <span id="site-brand">GOAT Explorer</span>
      <button type="button" class="site-nav-btn" data-view="home">Overview</button>
      <button type="button" class="site-nav-btn" data-view="how">How It Works</button>
      <button type="button" class="site-nav-btn" data-view="explorer">3D Explorer</button>
      <button type="button" class="site-nav-btn" data-view="alchemy">Alchemy Lab</button>
      <button type="button" class="site-nav-btn" data-view="pca">PCA Map</button>
    </nav>
    <iframe id="site-frame" title="GOAT view" src="home.html"></iframe>
  </div>
  <script>
    const VIEWS = {'home': 'home.html', 'how': 'how_it_works.html?embed=1', 'explorer': 'embed_3d.html?embed=1', 'alchemy': 'alchemy.html?embed=1', 'pca': 'pca_map.html?embed=1'};
    const frame = document.getElementById('site-frame');
    const buttons = document.querySelectorAll('.site-nav-btn');
    let currentView = 'home';

    function setView(view, { pushHash = true } = {}) {
      if (!VIEWS[view]) view = 'home';
      currentView = view;
      const src = VIEWS[view];
      if (frame.getAttribute('src') !== src) {
        frame.src = src;
      }
      buttons.forEach((btn) => btn.classList.toggle('active', btn.dataset.view === view));
      if (pushHash) {
        const next = view === 'home' ? '#home' : '#' + view;
        if (location.hash !== next) history.pushState(null, '', next);
      }
      const activeBtn = [...buttons].find((b) => b.dataset.view === view);
      document.title = 'GOAT — ' + (activeBtn ? activeBtn.textContent : 'Explorer');
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => setView(btn.dataset.view));
    });

    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'goat-nav' && event.data.view) {
        setView(event.data.view);
      }
    });

    frame.addEventListener('load', () => {
      try { frame.contentWindow?.dispatchEvent(new Event('resize')); } catch (_) {}
    });

    function viewFromHash() {
      const h = (location.hash || '#home').replace('#', '');
      return VIEWS[h] ? h : 'home';
    }

    window.addEventListener('hashchange', () => setView(viewFromHash(), { pushHash: false }));
    window.addEventListener('popstate', () => setView(viewFromHash(), { pushHash: false }));
    setView(viewFromHash(), { pushHash: false });
  </script>
</body>
</html>
